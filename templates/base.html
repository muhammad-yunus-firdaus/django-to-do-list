{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Manajemen Tugas{% endblock %}</title>
    <meta name="description" content="Kelola tugas dengan mudah dan efisien">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/apple-touch-icon.png' %}">
    <link rel="manifest" href="{% static 'site.webmanifest' %}">
    <meta name="theme-color" content="#4F46E5">
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tugas App">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Design System CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    {% block head %}{% endblock %}
</head>

<body>

    {% block layout %}
    <!-- Default layout: full page without sidebar (used by login/register) -->
    {% if messages %}
    <div style="position:fixed;top:16px;right:16px;z-index:100;max-width:400px;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
    {% endblock layout %}

    <!-- Lucide Icons Init -->
    <script>
        document.addEventListener("DOMContentLoaded", () => lucide.createIcons());

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/static/sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>

    <!-- Notification System -->
    <script>
        // Set CSRF token from Django template for AJAX requests
        window.CSRF_TOKEN = '{{ csrf_token }}';
    </script>
    <script src="{% static 'js/notifications.js' %}"></script>

    {% block scripts %}{% endblock %}

</body>

</html>
